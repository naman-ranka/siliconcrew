services:
  siliconcrew:
    build: .
    ports:
      - "${PORT_FRONTEND:-3000}:3000"
      - "${PORT_BACKEND:-8000}:8000"
      - "${PORT_MCP:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Host bind mounts. start.sh prompts for and exports these; the defaults
      # let `docker compose up` work straight from a clean checkout too.
      - ${HOST_WORKSPACE:-./workspace}:/workspace
      - ${HOST_DATA_DIR:-./.siliconcrew_data}:/root/.siliconcrew
    environment:
      - RTL_WORKSPACE=/workspace
      - HOST_WORKSPACE=${HOST_WORKSPACE:-./workspace}
    env_file:
      # Created by start.sh from .env.example; optional so `compose config`
      # doesn't fail before you've made it.
      - path: .env.docker
        required: false
