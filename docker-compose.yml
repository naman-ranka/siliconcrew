services:
  siliconcrew:
    build: .
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_WORKSPACE}:/workspace
    environment:
      - RTL_WORKSPACE=/workspace
      - HOST_WORKSPACE=${HOST_WORKSPACE}
    env_file:
      - .env.docker
