    const CODE_FILES = {
      "sync_fifo.v": `// sync_fifo.v — 16-deep x 8-bit synchronous FIFO
// full / empty / overflow flags, single clock domain @ 7ns
module sync_fifo #(
  parameter WIDTH = 8,
  parameter DEPTH = 16
) (
  input                     clk,
  input                     rst,
  input                     wr_en,
  input                     rd_en,
  input      [WIDTH-1:0]    din,
  output reg [WIDTH-1:0]    dout,
  output                    full,
  output                    empty,
  output reg                overflow
);
  localparam AW = $clog2(DEPTH);
  reg [AW:0] wptr, rptr;

  fifo_mem #(.WIDTH(WIDTH), .DEPTH(DEPTH)) mem (
    .clk   (clk),
    .wr_en (wr_en && !full),
    .waddr (wptr[AW-1:0]),
    .raddr (rptr[AW-1:0]),
    .din   (din),
    .dout  (dout)
  );

  assign full  = (wptr[AW] != rptr[AW]) && (wptr[AW-1:0] == rptr[AW-1:0]);
  assign empty = (wptr == rptr);

  always @(posedge clk) begin
    if (rst) begin
      wptr     <= 0;
      rptr     <= 0;
      overflow <= 1'b0;
    end else begin
      if (wr_en && !full)  wptr <= wptr + 1'b1;
      if (rd_en && !empty) rptr <= rptr + 1'b1;
      // overflow guard — was missing in R-06, fixed in R-06.1
      if (wr_en && full)   overflow <= 1'b1;
    end
  end
endmodule`,
      "fifo_mem.v": `// fifo_mem.v — dual-address synchronous memory for sync_fifo
module fifo_mem #(
  parameter WIDTH = 8,
  parameter DEPTH = 16
) (
  input                    clk,
  input                    wr_en,
  input  [$clog2(DEPTH)-1:0] waddr,
  input  [$clog2(DEPTH)-1:0] raddr,
  input  [WIDTH-1:0]       din,
  output [WIDTH-1:0]       dout
);
  reg [WIDTH-1:0] ram [0:DEPTH-1];

  always @(posedge clk) begin
    if (wr_en) ram[waddr] <= din;
  end

  assign dout = ram[raddr];
endmodule`,
    };

    // Minimal Verilog highlighter → returns one HTML string per line.
    function hlVerilog(src) {
      const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const kw = /\b(module|endmodule|input|output|inout|reg|wire|logic|assign|always|begin|end|if|else|case|endcase|posedge|negedge|parameter|localparam|default|for|integer|genvar|generate|endgenerate)\b/g;
      return esc(src).split("\n").map((line) => {
        let code = line, comment = "";
        const ci = line.indexOf("//");
        if (ci >= 0) { code = line.slice(0, ci); comment = '<span class="text-muted-foreground/60 italic">' + line.slice(ci) + "</span>"; }
        code = code
          .replace(/\b(\d+'[bhdBHD][0-9a-fA-FxXzZ_]+|\d+)\b/g, '<span class="text-info">$1</span>')
          .replace(/(\$\w+)/g, '<span class="text-status-warn">$1</span>')
          .replace(kw, '<span class="text-primary">$1</span>');
        return code + comment;
      });
    }

              {dark ? <Sun className="h-4 w-4" /> : <Moon className="h-4 w-4" />}

    function WaveformViewer() {
      const NAME_COL = 168, LANE_H = 26, BASE = 800, MINL = 600, PAD = 28;
      const [zoom, setZoom] = useState(1);
      const [radix, setRadix] = useState("hex");
      const [cursor, setCursor] = useState(null); // ns
      const [collapsed, setCollapsed] = useState(new Set());
      const lanesRef = React.useRef(null);
      const end = WAVE.endtime;
      const laneW = Math.max(MINL, BASE * zoom);
      const scale = (laneW - PAD) / end;
      const groups = [];
      for (const s of WAVE.signals) { let g = groups.find((x) => x[0] === s.scope); if (!g) { g = [s.scope, []]; groups.push(g); } g[1].push(s); }
      const ticks = Array.from({ length: 9 }, (_, i) => Math.round((end / 8) * i));
      const fmtBus = (v) => radix === "hex" ? "0x" + v.toString(16).toUpperCase() : String(v);
      const valueAt = (sig, at) => {
        if (at == null) return null; let idx = -1;
        for (let i = 0; i < sig.times.length; i++) { if (sig.times[i] <= at) idx = i; else break; }
        if (idx < 0) return null;
        return (sig.width ?? 1) > 1 ? fmtBus(sig.values[idx]) : String(sig.values[idx]);
      };
      const xToNs = (clientX) => { const h = lanesRef.current; if (!h) return null; const x = clientX - h.getBoundingClientRect().left - NAME_COL; if (x < 0) return null; return Math.min(Math.max(0, x / scale), end); };
      const toggle = (sc) => setCollapsed((p) => { const n = new Set(p); n.has(sc) ? n.delete(sc) : n.add(sc); return n; });
      const cursorX = cursor != null ? cursor * scale : null;

      const Lane = ({ sig }) => {
        const isBus = sig.isBus || (sig.width ?? 1) > 1, h = LANE_H;
        if (isBus) {
          return (
            <svg width={laneW} height={h} className="block">
              <line x1={0} y1={4} x2={laneW} y2={4} className="stroke-muted-foreground/40" strokeWidth={1} />
              <line x1={0} y1={h - 4} x2={laneW} y2={h - 4} className="stroke-muted-foreground/40" strokeWidth={1} />
              {sig.times.map((time, i) => {
                const x = time * scale, nextX = i < sig.times.length - 1 ? sig.times[i + 1] * scale : laneW;
                const label = radix === "hex" ? sig.values[i].toString(16).toUpperCase() : String(sig.values[i]);
                return (
                  <g key={i}>
                    <line x1={x} y1={4} x2={x} y2={h - 4} className="stroke-primary" strokeWidth={1} />
                    {nextX - x > 22 && <text x={x + (nextX - x) / 2} y={h / 2 + 4} textAnchor="middle" className="fill-foreground text-[9px] font-mono">{label}</text>}
                  </g>
                );
              })}
            </svg>
          );
        }
        let d = "";
        sig.times.forEach((time, i) => { const x = time * scale, y = sig.values[i] ? 5 : h - 5; if (i === 0) d = `M ${x} ${y}`; else { const py = sig.values[i - 1] ? 5 : h - 5; d += ` L ${x} ${py} L ${x} ${y}`; } });
        d += ` L ${laneW} ${sig.values[sig.values.length - 1] ? 5 : h - 5}`;
        return <svg width={laneW} height={h} className="block"><path d={d} className="stroke-primary" strokeWidth={1.5} fill="none" /></svg>;
      };

      return (
        <div className="flex flex-col h-full">
          <div className="flex items-center justify-between p-3 border-b border-border">
            <div className="flex items-center gap-2">
              <button className="flex items-center gap-2 h-8 w-[230px] px-2 rounded-md border border-border bg-surface-1 text-xs">
                <Activity className="h-4 w-4 text-muted-foreground" /><span className="font-mono truncate flex-1 text-left">dump.vcd</span><ChevronsUpDown className="h-3.5 w-3.5 text-muted-foreground" />
              </button>
              {cursor != null && <button onClick={() => setCursor(null)} className="text-[11px] text-info font-mono hover:underline">cursor @ {Math.round(cursor)}ns ✕</button>}
            </div>
            <div className="flex items-center gap-1">
              <div className="flex items-center rounded-md border border-border bg-surface-1 p-0.5 mr-1">
                {["hex", "dec"].map((r) => (
                  <button key={r} onClick={() => setRadix(r)} className={cn("px-2 py-0.5 text-[10px] font-mono uppercase rounded-[3px]", radix === r ? "bg-surface-3 text-foreground shadow-e1" : "text-muted-foreground hover:text-foreground hover:bg-surface-2")}>{r}</button>
                ))}
              </div>
              <Btn variant="ghost" size="icon" className="h-7 w-7" title="Fit" onClick={() => setZoom(1)}><Maximize2 className="h-3.5 w-3.5" /></Btn>
              <Btn variant="ghost" size="icon" className="h-7 w-7" title="Zoom out" onClick={() => setZoom((z) => Math.max(0.5, Math.round((z - 0.25) * 100) / 100))}><ZoomOut className="h-3.5 w-3.5" /></Btn>
              <span className="text-xs text-muted-foreground w-12 text-center tabular-nums">{Math.round(zoom * 100)}%</span>
              <Btn variant="ghost" size="icon" className="h-7 w-7" title="Zoom in" onClick={() => setZoom((z) => Math.min(4, Math.round((z + 0.25) * 100) / 100))}><ZoomIn className="h-3.5 w-3.5" /></Btn>
              <Btn variant="ghost" size="icon" className="h-7 w-7" title="Refresh"><RefreshCw className="h-3.5 w-3.5" /></Btn>
            </div>
          </div>
          <div className="flex-1 min-h-0 overflow-auto thin-scrollbar">
            <div style={{ minWidth: NAME_COL + laneW }}>
              <div className="flex sticky top-0 z-10 bg-surface-1 border-b border-border">
                <div style={{ width: NAME_COL }} className="shrink-0 px-2 py-1 text-[10px] text-muted-foreground">signal</div>
                <div className="relative" style={{ width: laneW, height: 20 }}>
                  {ticks.map((t, i) => <span key={i} className="absolute text-[9px] text-muted-foreground font-mono" style={{ left: Math.min(laneW - 24, t * scale + 2), top: 3 }}>{t}</span>)}
                </div>
              </div>
              <div ref={lanesRef} className="relative" onClick={(e) => { const t = xToNs(e.clientX); if (t != null) setCursor(t); }} title="Click to place a measurement cursor">
                <div className="absolute inset-0 z-0 pointer-events-none">
                  {ticks.map((t, i) => <div key={i} className="absolute top-0 bottom-0 w-px bg-border/40" style={{ left: NAME_COL + t * scale }} />)}
                </div>
                {cursorX != null && (
                  <div className="absolute top-0 bottom-0 w-px bg-info z-30" style={{ left: NAME_COL + cursorX }}>
                    <span className="absolute top-0 left-1 text-[9px] text-info font-mono bg-background/80 px-1 rounded">{Math.round(cursor)}ns</span>
                  </div>
                )}
                {groups.map(([scope, sigs]) => {
                  const isC = collapsed.has(scope);
                  return (
                    <div key={scope}>
                      <button onClick={(e) => { e.stopPropagation(); toggle(scope); }} className="flex items-center gap-1 w-full px-2 py-1 bg-surface-2/60 hover:bg-surface-2 border-b border-border text-left relative z-10">
                        {isC ? <ChevronRight className="h-3 w-3" /> : <ChevronDown className="h-3 w-3" />}
                        <span className="text-[10px] font-mono text-info truncate">{scope}</span><span className="text-[9px] text-muted-foreground">({sigs.length})</span>
                      </button>
                      {!isC && sigs.map((sig) => {
                        const v = valueAt(sig, cursor);
                        return (
                          <div key={sig.name} className="flex items-center border-b border-border/60 hover:bg-surface-1 relative z-10">
                            <div style={{ width: NAME_COL }} className="shrink-0 px-2 py-1 text-xs font-mono flex items-center gap-1">
                              <span className="truncate">{sig.name}</span>
                              {(sig.width ?? 1) > 1 && <span className="text-[9px] text-muted-foreground">[{sig.width}]</span>}
                              {v != null && <span className="ml-auto text-[10px] font-semibold tabular-nums text-info">={v}</span>}
                            </div>
                            <div className="shrink-0"><Lane sig={sig} /></div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
          <div className="p-2 border-t border-border text-xs text-muted-foreground flex items-center gap-3">
            <span>End: {WAVE.endtime} ns</span><span>{WAVE.signalCount} signals</span><span>{groups.length} scopes</span>
          </div>
        </div>
      );
    }

    const TABS = [
      { id: "spec", label: "Spec", icon: <FileText className="h-3.5 w-3.5" />, badge: 1 },
      { id: "code", label: "Code", icon: <Code className="h-3.5 w-3.5" />, badge: 2 },
      { id: "waveform", label: "Wave", icon: <Activity className="h-3.5 w-3.5" />, badge: 1 },
      { id: "schematic", label: "Schem", icon: <CircuitBoard className="h-3.5 w-3.5" />, badge: 1 },
      { id: "layout", label: "Layout", icon: <Layout className="h-3.5 w-3.5" />, badge: 1 },
      { id: "report", label: "Report", icon: <BarChart3 className="h-3.5 w-3.5" />, badge: 2 },
    ];
    function ArtifactsPanel({ run }) {
      const [tab, setTab] = useState("report");
      return (
        <div className="flex flex-col h-full bg-surface-0 border-l border-border">
          <div className="flex items-center gap-2 h-9 px-3 border-b border-border bg-surface-1 shrink-0">
            <h2 className="text-[11px] font-semibold uppercase tracking-wider text-muted-foreground">Artifacts</h2>
            <span className="text-[10px] text-muted-foreground bg-surface-2 px-1.5 py-0.5 rounded-full">7</span>
            <div className="flex items-center gap-1 ml-auto"><Btn variant="ghost" size="icon" className="h-6 w-6"><PanelRightClose className="h-4 w-4" /></Btn></div>
          </div>
          <div className="flex-1 flex flex-col min-h-0">
            <div className="flex justify-start border-b border-border h-11 px-2 gap-1 items-center bg-surface-0">
              {TABS.map((t) => (
                <button key={t.id} onClick={() => setTab(t.id)} className={cn("relative flex items-center px-2.5 py-1.5 gap-1.5 rounded-md transition-all", tab === t.id ? "bg-surface-2 shadow-sm" : "hover:bg-surface-1")}>
                  <span className={tab === t.id ? "text-primary" : "text-muted-foreground"}>{t.icon}</span>
                  <span className="text-xs">{t.label}</span>
                  {t.badge > 0 && <span className={cn("ml-1 h-4 min-w-[16px] px-1 rounded-full text-[10px] font-medium flex items-center justify-center", tab === t.id ? "bg-surface-3 text-foreground" : "bg-surface-2 text-muted-foreground")}>{t.badge}</span>}
                </button>
              ))}
            </div>
            <div className="flex-1 min-h-0 overflow-hidden animate-fade-in">
              {tab === "report" && <div className="h-full overflow-y-auto thin-scrollbar"><PpaHero run={run} /><ReportBody /></div>}
              {tab === "code" && <CodeViewer />}
              {tab === "waveform" && <WaveformViewer />}
              {tab === "spec" && (
                <div className="h-full overflow-y-auto thin-scrollbar p-4">
                  <div className="rounded-lg border border-border bg-surface-1 divide-y divide-border">
                    {SPEC_FIELDS.map(([k, v]) => (
                      <div key={k} className="flex items-center justify-between px-4 py-2.5 text-sm"><span className="text-muted-foreground">{k}</span><span className="font-mono text-foreground">{v}</span></div>
                    ))}
                  </div>
                </div>
              )}
              {(tab === "schematic" || tab === "layout") && (
                <div className="h-full flex flex-col items-center justify-center gap-3 text-muted-foreground">
                  {tab === "schematic" ? <CircuitBoard className="h-8 w-8 opacity-40" /> : <Layout className="h-8 w-8 opacity-40" />}
                  <span className="text-sm capitalize">{tab} viewer</span>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function Console() {
      const [active, setActive] = useState(ACTIVE_CONSOLE_DEFAULT);
      const [expanded, setExpanded] = useState(false);
      const [copied, setCopied] = useState(false);
      const [editing, setEditing] = useState(false);
      const tabs = [{ id: "lint", label: "Lint" }, { id: "sim", label: "Sim" }, { id: "synth", label: "Synth" }];
      const last = CONSOLE[active];
      return (
        <div className={cn("flex flex-col border-t border-border bg-surface-1 transition-[height] duration-base ease-swift", expanded ? "h-64" : "h-auto")}>
          <div className="flex items-center gap-1 px-2 h-9 border-b border-border">
            <Terminal className="h-3.5 w-3.5 text-muted-foreground mr-1" />
            {tabs.map((t) => {
              const le = CONSOLE[t.id]; const on = active === t.id;
              return (
                <button key={t.id} onClick={() => setActive(t.id)} className={cn("flex items-center gap-1.5 text-xs px-2 py-1 rounded-md transition-colors", on ? "bg-surface-2 text-foreground shadow-e1 font-medium" : "text-muted-foreground hover:bg-surface-2/60 hover:text-foreground")}>
                  <span className={cn("h-1.5 w-1.5 rounded-full shrink-0", statusDot(le.status))} />{t.label}
                  {le.runId && <span className={cn("font-mono text-[10px] rounded px-1 py-px", on ? "bg-surface-0 text-muted-foreground" : "text-muted-foreground")}>{le.runId}</span>}
                </button>
              );
            })}
            <div className="ml-auto flex items-center gap-1">
              <Btn variant="ghost" size="icon" className="h-6 w-6" onClick={() => setExpanded(!expanded)}>{expanded ? <ChevronDown className="h-4 w-4" /> : <ChevronUp className="h-4 w-4" />}</Btn>
            </div>
          </div>
          {!expanded && (
            <div className="px-3 py-2 text-xs flex items-center gap-2 min-h-[2.25rem]">
              <span className={cn("h-1.5 w-1.5 rounded-full shrink-0", statusDot(last.status))} />
              <span className="truncate">{last.summary}</span>
            </div>
          )}
          {expanded && (
            <div className="flex flex-col flex-1 min-h-0 animate-fade-in">
              <div className="flex items-center gap-2 px-3 py-1.5 border-b border-border text-xs">
                <span className={cn("h-1.5 w-1.5 rounded-full shrink-0", statusDot(last.status))} />
                <span className="truncate text-foreground">{last.summary}</span>
                <button onClick={() => { setCopied(true); setTimeout(() => setCopied(false), 1500); }} className="ml-auto flex items-center gap-1 text-[10px] px-1.5 py-0.5 rounded-md shrink-0 text-muted-foreground hover:bg-surface-2 hover:text-foreground">
                  {copied ? <Check className="h-3 w-3 text-status-pass" /> : <Copy className="h-3 w-3" />}{copied ? "Copied" : "Copy"}
                </button>
              </div>
              <div className="flex-1 overflow-auto thin-scrollbar p-2 space-y-2 font-mono text-[11px]">
                <pre className="whitespace-pre-wrap break-words text-[10px] leading-relaxed text-info bg-surface-2 rounded px-2 py-1.5">{last.command.split("\n").map((c) => "$ " + c).join("\n")}</pre>
                <pre className="whitespace-pre-wrap break-words text-[10px] leading-relaxed text-muted-foreground px-1">{last.detail}</pre>
              </div>
              <div className="border-t border-border px-2 py-1.5 text-[10px]">
                {!editing ? (
                  <button onClick={() => setEditing(true)} className="text-muted-foreground hover:text-foreground flex items-center gap-1"><Pencil className="h-3 w-3" /> edit &amp; re-run command</button>
                ) : (
                  <div className="space-y-1">
                    <textarea defaultValue={last.command} rows={2} className="w-full bg-surface-0 border border-border rounded p-1 text-[10px] font-mono" />
                    <div className="flex items-center gap-2">
                      <Btn size="sm" className="h-6 gap-1 text-[10px]"><Play className="h-3 w-3" /> Re-run {active}</Btn>
                      <button onClick={() => setEditing(false)} className="text-muted-foreground hover:text-foreground">cancel</button>
                      <span className="text-[9px] text-muted-foreground">re-runs via the tool — the UI never shells raw EDA</span>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ---------------- right rail: chat ---------------------------------------- */
    const toolLabelMap = {
      write_spec: "Writing Specification", write_file: "Writing File", linter_tool: "Running Linter",
      simulation_tool: "Running Simulation", start_synthesis: "Starting Synthesis",
    };
    function ToolCallCard({ toolCall, result }) {
      const [open, setOpen] = useState(false);
      const s = (result?.status || "").toLowerCase();
      const ok = ["success", "passed", "test_passed"].includes(s);
      const err = s.includes("fail") || s.includes("error");
      const args = toolCall.args;
      const summary = args.filename || args.design_file || args.module_name || (Array.isArray(args.verilog_files) ? args.verilog_files.join(", ") : null);
      return (
        <div className="text-xs">
          <button className="flex items-center gap-1.5 text-muted-foreground/70 hover:text-foreground transition-colors w-full text-left group" onClick={() => setOpen(!open)}>
            <span className="shrink-0">{ok ? <Check className="h-3 w-3 text-success/70" /> : err ? <X className="h-3 w-3 text-destructive/70" /> : <Wrench className="h-3 w-3" />}</span>
            <span className="font-mono">{toolLabelMap[toolCall.name] || toolCall.name}</span>
            {summary && <><span className="text-muted-foreground/30">·</span><span className="font-mono truncate max-w-[200px] text-muted-foreground/50">{summary}</span></>}
            <span className="ml-auto opacity-0 group-hover:opacity-100 transition-opacity shrink-0">{open ? <ChevronDown className="h-3 w-3" /> : <ChevronRight className="h-3 w-3" />}</span>
          </button>
          {open && result && (
            <div className="mt-2 ml-5 space-y-2">
              <pre className="text-xs bg-surface-1 border border-border/40 p-2 rounded overflow-x-auto max-h-[180px] font-mono text-foreground/70">{JSON.stringify(toolCall.args, null, 2)}</pre>
              <pre className={cn("text-xs border p-2 rounded overflow-x-auto whitespace-pre-wrap font-mono", err ? "bg-destructive/5 border-destructive/20 text-destructive/80" : "bg-surface-1 border-border/40 text-foreground/70")}>{result.content}</pre>
            </div>
          )}
        </div>
      );
    }
    function MdText({ content }) {
      const html = content
        .replace(/`([^`]+)`/g, '<code class="bg-surface-2 text-primary px-1.5 py-0.5 rounded text-[13px] font-mono">$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong class="font-semibold text-foreground">$1</strong>');
      return <div className="prose prose-sm max-w-none text-sm leading-relaxed text-foreground/90" dangerouslySetInnerHTML={{ __html: html }} />;
    }
    function ChatArea() {
      return (
        <div className="flex flex-col h-full bg-background">
          <div className="flex items-center justify-between h-14 px-4 border-b border-border bg-surface-0">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center"><Cpu className="h-4 w-4 text-primary" /></div>
              <div className="min-w-0">
                <h1 className="font-semibold text-sm truncate">{SESSION.name}</h1>
                <button className="flex items-center gap-1 text-xs text-muted-foreground hover:text-foreground"><span>Chat 1</span><ChevronDown className="h-3 w-3" /></button>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-1.5 text-xs text-muted-foreground"><Hash className="h-3.5 w-3.5" /><span>48.2k</span></div>
              <div className="flex items-center gap-1.5 text-xs text-muted-foreground"><Coins className="h-3.5 w-3.5" /><span>$0.82</span></div>
            </div>
          </div>
          <div className="flex-1 overflow-y-auto thin-scrollbar">
            <div className="max-w-3xl mx-auto py-6">
              {MESSAGES.map((m) => m.role === "user" ? (
                <div key={m.id} className="flex justify-end gap-3 px-4 py-3">
                  <div className="max-w-[75%]">
                    <div className="bg-primary text-primary-foreground rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm leading-relaxed whitespace-pre-wrap break-words">{m.content}</div>
                  </div>
                  <div className="flex-shrink-0 w-8 h-8 rounded-full bg-primary flex items-center justify-center self-end mb-0.5"><User className="h-4 w-4 text-primary-foreground" /></div>
                </div>
              ) : (
                <div key={m.id} className="flex items-start gap-3 px-4 py-3">
                  <div className="flex-shrink-0 w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center"><Bot className="h-4 w-4 text-primary" /></div>
                  <div className="flex-1 min-w-0 space-y-3">
                    {m.blocks.map((b, i) => b.type === "text" ? <MdText key={i} content={b.content} /> : <ToolCallCard key={i} toolCall={b.toolCall} result={b.result} />)}
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="p-3 border-t border-border bg-surface-0">
            <div className="flex items-end gap-2 rounded-xl border border-border bg-surface-1 px-3 py-2 focus-within:border-primary/50">
              <textarea rows={1} placeholder="Ask the architect to refine the design…" className="flex-1 bg-transparent resize-none outline-none text-sm placeholder:text-muted-foreground py-1" />
              <Btn size="icon" className="h-8 w-8 rounded-lg"><ArrowRight className="h-4 w-4" /></Btn>
            </div>
          </div>
        </div>
      );
    }

    /* ---------------- shell ---------------------------------------------------- */
    function Workbench() {
      const [dark, setDark] = useState(true);
      const [chatOpen, setChatOpen] = useState(true);
      const [selectedRun, setSelectedRun] = useState(SELECTED_RUN);
      const run = RUNS.find((r) => r.id === selectedRun) || RUNS[0];
      const viewRun = run.kind === "synth" ? run : RUNS.find((r) => r.id === SELECTED_RUN);
      React.useEffect(() => { document.documentElement.classList.toggle("dark", dark); document.documentElement.classList.toggle("light", !dark); }, [dark]);
      return (
        <main className="h-screen w-screen overflow-hidden flex flex-col bg-background">
          <TopBar dark={dark} setDark={setDark} />
          <PipelineStepper />
          <div className="flex-1 min-h-0 flex">
            {/* Left rail */}
            <div className="w-[20%] min-w-[220px] max-w-[340px] flex flex-col bg-surface-0 border-r border-border min-h-0">
              <div className="flex-1 min-h-0 overflow-y-auto thin-scrollbar"><FileTree /></div>
              <RunsTimeline selected={selectedRun} onSelect={setSelectedRun} />
            </div>
            {/* Center */}
            <div className="flex-1 flex flex-col min-h-0">
              <ViewingBanner run={viewRun} />
              <div className="flex-1 min-h-0"><ArtifactsPanel run={RUNS.find(r=>r.id==="S-04")} /></div>
              <Console />
            </div>
            {/* Right rail */}
            {chatOpen && (
              <div className="w-[28%] min-w-[300px] max-w-[460px] flex flex-col border-l border-border min-h-0 animate-fade-in">
                <PanelHeader label="AI Assistant" icon={<MessageSquare className="h-3.5 w-3.5 text-primary" />}>
                  <span className="text-[10px] text-muted-foreground mr-1 hidden lg:inline">same tools · same workspace</span>
                  <Btn variant="ghost" size="icon" className="h-6 w-6" title="Collapse assistant" onClick={() => setChatOpen(false)}><PanelRightClose className="h-4 w-4" /></Btn>
                </PanelHeader>
                <div className="flex-1 min-h-0"><ChatArea /></div>
              </div>
            )}
          </div>
          {!chatOpen && (
            <button onClick={() => setChatOpen(true)} className="fixed right-0 top-1/2 -translate-y-1/2 z-50 flex items-center gap-1 bg-surface-2 border border-border border-r-0 rounded-l-md px-2 py-3 text-xs text-muted-foreground shadow-e1 hover:text-primary hover:bg-surface-3">
              <PanelRightOpen className="h-4 w-4" /><span className="[writing-mode:vertical-rl] rotate-180">AI Assistant</span>
            </button>
          )}
        </main>
      );
    }

    createRoot(document.getElementById("root")).render(<Workbench />);
  </script>
</body>
</html>
