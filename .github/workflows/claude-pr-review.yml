name: Claude PR Review

# Automatic code review on PR open, plus @claude mentions from maintainers.
# Review-only: the agent never pushes code, approves, or merges.

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  auto-review:
    name: Automatic review
    # Same-repo PRs only: fork PRs get no secrets, so skip instead of failing red.
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            Review PR #${{ github.event.pull_request.number }}.

            Process:
            1. Resolve stacking first: `gh pr view ${{ github.event.pull_request.number }} --json baseRefName`.
               If the base is another open PR's branch, review only the incremental
               diff (base...head), not the inherited changes.
            2. Read the full context of changed files, not just hunks. Hunt for REAL
               bugs with concrete failure sequences (inputs/state -> wrong behavior).
               Verify every finding against the actual code before reporting it —
               no speculation. Mark each finding "verified" or "plausible".
            3. Focus on: correctness bugs; security (input validation, injection,
               path traversal, secrets or credentials committed); error handling and
               edge cases; and whether changed behavior has adequate test coverage
               (a regression test that exercises the actual changed path, not one
               that string-matches the implementation).

            Output: post ONE review comment on the PR containing: (a) a 3-sentence
            summary of what the PR does; (b) findings ranked by severity, each with
            file:line, the concrete failure scenario, and verified/plausible;
            (c) a recommendation: ready / needs-fixes / needs-discussion.

            Hard rules: never push commits, never approve, never merge, never edit
            the PR branch. Review only.
          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*),Bash(git fetch:*),Bash(git show:*),Bash(git diff:*),Bash(git log:*),Bash(gh pr comment:*)"

  mention:
    name: "@claude mention"
    # Maintainer-authored comments only — this is a public repo.
    if: >
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: write      # implement: push a fix branch and open a PR
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Implementation runs on Opus 4.8. When asked to fix an issue: branch
          # from main, open a PR against main — never push to main directly.
          claude_args: |
            --model claude-opus-4-8
