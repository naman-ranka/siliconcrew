name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y iverilog

    - name: Install Python deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Unit tests for stdcells + simulation contract + session context
      env:
        PYTHONPATH: .
      run: |
        pytest -q tests/test_guardrails_and_stdcells.py tests/test_simulation_contract.py tests/test_session_context.py tests/test_session_context_propagation.py

    - name: Auth + tenancy red-team tests
      env:
        PYTHONPATH: .
      run: |
        pytest -q tests/test_auth.py tests/test_tenancy_redteam.py

    - name: First-run stdcell bootstrap
      env:
        PYTHONPATH: .
      run: |
        python scripts/bootstrap_stdcells.py --workspace workspace --platform asap7
        python scripts/bootstrap_stdcells.py --workspace workspace --platform sky130hd

    - name: Post-synth smoke (one per platform)
      env:
        PYTHONPATH: .
      run: |
        python scripts/ci_postsynth_smoke.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install deps
      run: npm ci

    - name: Unit tests (vitest)
      run: npm run test

    - name: Production build
      run: npm run build

  terraform-fmt:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Check formatting
      run: terraform -chdir=deploy/terraform fmt -check -recursive
