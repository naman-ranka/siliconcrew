name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y iverilog

    - name: Install Python deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # The fast set is selected by MARKER, not a filename list — a new dep-light
    # test gates automatically, with nothing to remember to wire up here.
    # Heavy tests (requires_eda / requires_services / slow) keep their skipif
    # guards and run in the local/nightly lane. See docs/TESTING.md.
    - name: Fast unit tests (pure-Python; selected by marker)
      env:
        PYTHONPATH: .
      run: |
        pytest -m 'not requires_eda and not slow and not requires_services' -q

    - name: First-run stdcell bootstrap
      env:
        PYTHONPATH: .
      run: |
        python scripts/bootstrap_stdcells.py --workspace . --platform asap7
        python scripts/bootstrap_stdcells.py --workspace . --platform sky130hd

    - name: Post-synth smoke (one per platform)
      env:
        PYTHONPATH: .
      run: |
        python scripts/ci_postsynth_smoke.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install deps
      run: npm ci

    - name: Unit tests (vitest)
      run: npm run test

    - name: Production build
      run: npm run build

  terraform-fmt:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Check formatting
      run: terraform -chdir=deploy/terraform fmt -check -recursive
