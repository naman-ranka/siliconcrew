// full / empty / overflow flags, single clock domain @ 7ns
module sync_fifo #(
  parameter WIDTH = 8,
  parameter DEPTH = 16
) (
  input                     clk,
  input                     rst,
  input                     wr_en,
  input                     rd_en,
  input      [WIDTH-1:0]    din,
  output reg [WIDTH-1:0]    dout,
  output                    full,
  output                    empty,
  output reg                overflow
);

    .wr_en (wr_en && !full),

    .raddr (rptr[AW-1:0]),

      rptr     <= 0;

endmodule`,

    function hlVerilog(src) {

        let code = line, comment = "";

        if (ci >= 0) { code = line.slice(0, ci); comment = '<span class="text-muted-foreground/60 italic">' + line.slice(ci) + "</span>"; }

          .replace(/\b(\d+'[bhdBHD][0-9a-fA-FxXzZ_]+|\d+)\b/g, '<span class="text-info">$1</span>')
          .replace(/(\$\w+)/g, '<span class="text-status-warn">$1</span>')
          .replace(kw, '<span class="text-primary">$1</span>');
        return code + comment;
      });
    }

    const WAVE = (() => {

        window.addEventListener("keydown", esc);
        return () => window.removeEventListener("keydown", esc);
      }, [menu]);
      if (!menu) return null;
      const f = menu.file;
      const isV = f.name.endsWith(".v") || f.name.endsWith(".sv");
      const items = [];
      items.push({ label: "Open", icon: <FileCode className="h-3.5 w-3.5" /> });
      if (isV) {
        items.push({ sep: true });
        items.push({ label: "Lint", icon: <FileText className="h-3.5 w-3.5" />, short: `${MOD} L`, act: () => onRun("lint") });
        items.push({ label: "Simulate", icon: <Waves className="h-3.5 w-3.5" />, short: `${MOD} R`, act: () => onRun("sim") });
        if (f.synthTop) items.push({ label: "Synthesize", icon: <Cpu className="h-3.5 w-3.5" />, short: `${MOD} Y`, act: () => onRun("synth") });
        items.push({ sep: true });

        if (f.synthTop) items.push({ label: "Synthesize… (options)", icon: <Sliders className="h-3.5 w-3.5" />, act: () => onOptions("synth") });

      const out = [];

    function WaveformView({ art }) {
      const NAME_COL = 168, LANE_H = 26, BASE = 760, MINL = 560, PAD = 28;
      const [zoom, setZoom] = useState(1);
      const [radix, setRadix] = useState("hex");
      const [cursor, setCursor] = useState(art && art.status === "failed" ? 320 : null);
      const [collapsed, setCollapsed] = useState(new Set());
      const lanesRef = useRef(null);
      const end = WAVE.endtime;
      const laneW = Math.max(MINL, BASE * zoom);
      const scale = (laneW - PAD) / end;
      const groups = [];
      for (const s of WAVE.signals) { let g = groups.find((x) => x[0] === s.scope); if (!g) { g = [s.scope, []]; groups.push(g); } g[1].push(s); }
      const ticks = Array.from({ length: 9 }, (_, i) => Math.round((end / 8) * i));
      const fmtBus = (v) => radix === "hex" ? "0x" + v.toString(16).toUpperCase() : String(v);
      const valueAt = (sig, at) => {
        if (at == null) return null; let idx = -1;
        for (let i = 0; i < sig.times.length; i++) { if (sig.times[i] <= at) idx = i; else break; }
        if (idx < 0) return null;
        return (sig.width ?? 1) > 1 ? fmtBus(sig.values[idx]) : String(sig.values[idx]);
      };
      const xToNs = (clientX) => { const h = lanesRef.current; if (!h) return null; const x = clientX - h.getBoundingClientRect().left - NAME_COL; if (x < 0) return null; return Math.min(Math.max(0, x / scale), end); };
      const toggle = (sc) => setCollapsed((p) => { const n = new Set(p); n.has(sc) ? n.delete(sc) : n.add(sc); return n; });
      const cursorX = cursor != null ? cursor * scale : null;
      const Lane = ({ sig }) => {
        const isBus = sig.isBus || (sig.width ?? 1) > 1, h = LANE_H;
        if (isBus) {
          return (
            <svg width={laneW} height={h} className="block">
              <line x1={0} y1={4} x2={laneW} y2={4} className="stroke-muted-foreground/40" strokeWidth={1} />
              <line x1={0} y1={h - 4} x2={laneW} y2={h - 4} className="stroke-muted-foreground/40" strokeWidth={1} />
              {sig.times.map((time, i) => {
                const x = time * scale, nextX = i < sig.times.length - 1 ? sig.times[i + 1] * scale : laneW;
                const label = radix === "hex" ? sig.values[i].toString(16).toUpperCase() : String(sig.values[i]);
                return (<g key={i}>
                  <line x1={x} y1={4} x2={x} y2={h - 4} className="stroke-primary" strokeWidth={1} />
                  {nextX - x > 22 && <text x={x + (nextX - x) / 2} y={h / 2 + 4} textAnchor="middle" className="fill-foreground text-[9px] font-mono">{label}</text>}
                </g>);
              })}
            </svg>
          );
        }
        let d = "";
        sig.times.forEach((time, i) => { const x = time * scale, y = sig.values[i] ? 5 : h - 5; if (i === 0) d = `M ${x} ${y}`; else { const py = sig.values[i - 1] ? 5 : h - 5; d += ` L ${x} ${py} L ${x} ${y}`; } });
        d += ` L ${laneW} ${sig.values[sig.values.length - 1] ? 5 : h - 5}`;
        return <svg width={laneW} height={h} className="block"><path d={d} className="stroke-primary" strokeWidth={1.5} fill="none" /></svg>;
      };
      return (
        <div className="flex flex-col h-full">
          <div className="flex items-center justify-between px-3 h-8 border-b border-border/60 shrink-0">
            <div className="flex items-center gap-2">
              <span className="flex items-center gap-1.5 text-[11px] font-mono text-muted-foreground">{art && art.status === "failed" && <span className="h-1.5 w-1.5 rounded-full bg-status-fail" />}<span className="text-foreground/80">{art ? art.path || (art.runId + "/dump.vcd") : "dump.vcd"}</span></span>
              {cursor != null && <button onClick={() => setCursor(null)} className={cn("text-[11px] font-mono hover:underline", art && art.status === "failed" ? "text-status-fail" : "text-info")}>@{Math.round(cursor)}ns{art && art.status === "failed" ? " · overflow not set" : ""} ✕</button>}
            </div>
            <div className="flex items-center gap-1">
              <div className="flex items-center rounded-md border border-border bg-surface-1 p-0.5 mr-1">
                {["hex", "dec"].map((r) => <button key={r} onClick={() => setRadix(r)} className={cn("px-1.5 py-0.5 text-[10px] font-mono uppercase rounded-[3px]", radix === r ? "bg-surface-3 text-foreground" : "text-muted-foreground hover:text-foreground")}>{r}</button>)}
              </div>
              <Btn variant="ghost" size="icon-sm" title="Fit" onClick={() => setZoom(1)}><Maximize2 className="h-3.5 w-3.5" /></Btn>
              <Btn variant="ghost" size="icon-sm" title="Zoom out" onClick={() => setZoom((z) => Math.max(0.5, Math.round((z - 0.25) * 100) / 100))}><ZoomOut className="h-3.5 w-3.5" /></Btn>
              <span className="text-[11px] text-muted-foreground w-10 text-center tabular-nums">{Math.round(zoom * 100)}%</span>
              <Btn variant="ghost" size="icon-sm" title="Zoom in" onClick={() => setZoom((z) => Math.min(4, Math.round((z + 0.25) * 100) / 100))}><ZoomIn className="h-3.5 w-3.5" /></Btn>
            </div>
          </div>
          <div className="flex-1 min-h-0 overflow-auto thin-scrollbar">
            <div style={{ minWidth: NAME_COL + laneW }}>
              <div className="flex sticky top-0 z-10 bg-surface-1 border-b border-border">
                <div style={{ width: NAME_COL }} className="shrink-0 px-2 py-1 text-[10px] text-muted-foreground">signal</div>
                <div className="relative" style={{ width: laneW, height: 20 }}>
                  {ticks.map((t, i) => <span key={i} className="absolute text-[9px] text-muted-foreground font-mono" style={{ left: Math.min(laneW - 24, t * scale + 2), top: 3 }}>{t}</span>)}
                </div>
              </div>
              <div ref={lanesRef} className="relative" onClick={(e) => { const t = xToNs(e.clientX); if (t != null) setCursor(t); }}>
                <div className="absolute inset-0 z-0 pointer-events-none">
                  {ticks.map((t, i) => <div key={i} className="absolute top-0 bottom-0 w-px bg-border/40" style={{ left: NAME_COL + t * scale }} />)}
                </div>
                {cursorX != null && <div className="absolute top-0 bottom-0 w-px bg-info z-30" style={{ left: NAME_COL + cursorX }}><span className="absolute top-0 left-1 text-[9px] text-info font-mono bg-background/80 px-1 rounded">{Math.round(cursor)}ns</span></div>}
                {groups.map(([scope, sigs]) => {
                  const isC = collapsed.has(scope);
                  return (
                    <div key={scope}>
                      <button onClick={(e) => { e.stopPropagation(); toggle(scope); }} className="flex items-center gap-1 w-full px-2 py-1 bg-surface-2/50 hover:bg-surface-2 border-b border-border text-left relative z-10">
                        {isC ? <ChevronRight className="h-3 w-3" /> : <ChevronDown className="h-3 w-3" />}
                        <span className="text-[10px] font-mono text-info truncate">{scope}</span><span className="text-[9px] text-muted-foreground">({sigs.length})</span>
                      </button>
                      {!isC && sigs.map((sig) => {
                        const v = valueAt(sig, cursor);
                        return (
                          <div key={sig.name} className="flex items-center border-b border-border/50 hover:bg-surface-1 relative z-10">
                            <div style={{ width: NAME_COL }} className="shrink-0 px-2 py-1 text-xs font-mono flex items-center gap-1">
                              <span className="truncate">{sig.name}</span>
                              {(sig.width ?? 1) > 1 && <span className="text-[9px] text-muted-foreground">[{sig.width}]</span>}
                              {v != null && <span className="ml-auto text-[10px] font-semibold tabular-nums text-info">={v}</span>}
                            </div>
                            <div className="shrink-0"><Lane sig={sig} /></div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>

              <rect x="170" y="140" width="60" height="30" rx="4" className="fill-surface-2 stroke-border" /><text x="200" y="159" textAnchor="middle" className="fill-foreground/70 text-[9px] font-mono">rptr</text>
              {["dout","full","empty","overflow"].map((p,i)=>(<g key={p}><line x1="290" y1={50+i*38} x2="340" y2={50+i*38} className="stroke-muted-foreground/50" /><text x="346" y={54+i*38} className="fill-muted-foreground text-[10px] font-mono">{p}</text></g>))}

    function LayoutView({ run }) {

        <div className="h-full flex flex-col">
          <div className="flex items-center gap-1.5 h-9 px-3 border-b border-border/60 shrink-0">
            <span className="text-[11px] font-mono text-muted-foreground mr-1">ORFS stage preview{run ? ` · ${run.id}` : ""}</span>
            {stages.map((s)=><button key={s} onClick={()=>setStage(s)} className={cn("h-6 px-2 rounded text-[11px] font-mono", stage===s ? "bg-surface-3 text-foreground" : "text-muted-foreground hover:bg-surface-2")}>{s}</button>)}
            <span className="ml-auto text-[11px] font-mono text-status-pass">0 DRC</span>
          </div>
          <div className="flex-1 grid place-items-center bg-surface-0 p-4">
            <svg width="300" height="300" className="border border-border">
              <rect x="0" y="0" width="300" height="300" className="fill-surface-1" />
              <rect x="20" y="20" width="260" height="260" className="fill-none stroke-info/40" strokeWidth="1" />
              {Array.from({ length: stage==="floorplan"?0:120 }).map((_,i)=>{ const c=i%12, r=Math.floor(i/12); return <rect key={i} x={30+c*21} y={30+r*21} width={14} height={12} className={cn(stage==="route"?"fill-primary/30":"fill-muted-foreground/25")} />; })}
              {stage==="route" && Array.from({ length: 14 }).map((_,i)=><line key={i} x1={28+i*18} y1={24} x2={28+i*18} y2={276} className="stroke-info/40" strokeWidth="0.75" />)}
              {stage==="cts" && <g className="stroke-status-warn/60" fill="none"><path d="M150 30 L80 150 M150 30 L220 150 M80 150 L50 260 M80 150 L110 260 M220 150 L190 260 M220 150 L250 260" /></g>}
            </svg>
          </div>
        </div>
      );
    }
    function SpecView() {
      const [raw, setRaw] = useState(false);
      return (
        <div className="h-full overflow-y-auto thin-scrollbar p-4">
          <div className="flex items-center gap-2 mb-3">
            <div className="flex items-center rounded-md border border-border bg-surface-1 p-0.5">
              {["fields","raw"].map((m)=><button key={m} onClick={()=>setRaw(m==="raw")} className={cn("px-2 py-0.5 text-[11px] rounded-[4px]", (raw===(m==="raw")) ? "bg-surface-3 text-foreground" : "text-muted-foreground")}>{m}</button>)}
            </div>
            <span className="text-[11px] font-mono text-muted-foreground">spec.yaml</span>
            <span className="ml-auto text-[10px] font-mono text-muted-foreground/60">contract · linted against rtl</span>
          </div>
          {raw ? (
            <pre className="text-[12px] font-mono leading-relaxed text-foreground/80 bg-surface-0 border border-border rounded p-3 max-w-md">{SPEC_FIELDS.map(([k,v])=>`${k.toLowerCase()}: ${/[, ]/.test(v)?'"'+v+'"':v}`).join("\n")}</pre>
          ) : (
            <div className="rounded-md border border-border bg-surface-1 divide-y divide-border/60 max-w-md">
              {SPEC_FIELDS.map(([k,v])=>(
                <div key={k} className="flex items-center justify-between px-3 py-2">
                  <span className="text-muted-foreground text-xs uppercase tracking-wide">{k}</span>
                  <span className="flex items-center gap-2 font-mono text-[13px] text-foreground/90">{v}<Check className="h-3 w-3 text-status-pass" title="implemented in rtl" /></span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function ArtifactCenter({ tabs, active, onActivate, onClose, flashKey, resolve, runs }) {
      const art = active ? resolve(active) : null;
      const reportRun = art && art.type === "report" ? runs.find((r) => r.id === art.runId) : null;
      const layoutRun = art && art.type === "layout" ? runs.find((r) => r.id === art.runId) : null;
      return (
        <div className="flex flex-col h-full min-h-0 bg-surface-0">
          {tabs.length > 0 && (
            <div className="flex items-stretch h-9 border-b border-border/70 bg-surface-1 shrink-0 overflow-x-auto thin-scrollbar">
              {tabs.map((k) => {
                const a = resolve(k); if (!a) return null; const I = ART_TYPE[a.type]; const on = active === k;
                return (
                  <div key={k} onClick={() => onActivate(k)} className={cn("group relative flex items-center gap-1.5 pl-3 pr-2 border-r border-border/50 cursor-pointer whitespace-nowrap transition-colors", on ? "bg-surface-0 text-foreground" : "text-muted-foreground hover:bg-surface-2/50", flashKey === k && "animate-flash")}>
                    {on && <span className="absolute top-0 left-0 right-0 h-0.5 bg-primary" />}
                    <span className={on ? "text-primary" : "text-muted-foreground/70"}><I className="h-3.5 w-3.5" /></span>
                    <span className="text-xs">{a.label}</span>
                    <button onClick={(e) => { e.stopPropagation(); onClose(k); }} className="ml-1 h-4 w-4 grid place-items-center rounded hover:bg-surface-3 text-muted-foreground/50 hover:text-foreground opacity-0 group-hover:opacity-100"><X className="h-3 w-3" /></button>
                  </div>
                );
              })}
            </div>
          )}
          <div className="flex-1 min-h-0 overflow-hidden animate-fade-in">
            {!art ? (
              <div className="h-full grid place-items-center">
                <div className="flex flex-col items-center gap-3 text-center max-w-xs">
                  <div className="h-12 w-12 rounded-xl bg-surface-2 grid place-items-center text-muted-foreground/50"><Layers className="h-6 w-6" /></div>
                  <div className="text-sm font-medium text-foreground/80">Nothing open</div>
                  <div className="text-[12px] text-muted-foreground leading-relaxed">Open a file from the tree, or an artifact from a run. Press <Kbd>{MOD} P</Kbd> to quick-open anything.</div>
                </div>
              </div>
            ) : art.type === "code" ? <CodeView file={art.path} />
              : art.type === "spec" ? <SpecView />
              : art.type === "wave" ? <WaveformView art={art} />
              : art.type === "schematic" ? <SchematicView />
              : art.type === "layout" ? <LayoutView run={layoutRun} />
              : art.type === "report" ? (reportRun && reportRun.ppa ? <ReportView run={reportRun} /> : (
                  <div className="h-full grid place-items-center text-center">
                    <div className="flex flex-col items-center gap-2 text-muted-foreground/60"><RefreshCw className="h-6 w-6 animate-spin text-status-running" /><span className="text-xs font-mono">{art.runId} · synthesizing…</span></div>
                  </div>
                ))
              : null}
          </div>
        </div>
      );
    }

    /* ======================= bottom dock: activity + runs =================== */
    // Stream (1a): one chronological, filterable tool-call history. Rows expand to
    // the real MCP call + typed result (lint → file:line diagnostics, sim → VCD link).
    const ACT_FILTERS = [["all","All"],["lint","Lint"],["sim","Sim"],["synth","Synth"],["write","Writes"]];
    function LintDiagnostics({ result, onOpenLine }) {
      const items = [...(result.errors||[]).map(d=>({...d,severity:"error"})), ...(result.warnings||[])];
      return (
        <div className="space-y-1">
          {result.command && <div className="font-mono text-[10.5px] text-info bg-surface-2/60 rounded px-2 py-1">$ {result.command}</div>}
          {items.length===0 ? <div className="text-[11px] text-status-pass font-mono px-1">clean · 0 diagnostics</div> : items.map((d,i)=>(
            <button key={i} onClick={()=>onOpenLine&&onOpenLine(d)} className="group flex items-center gap-2 w-full text-left px-2 py-1 rounded hover:bg-surface-2">
              {d.severity==="error" ? <X className="h-3 w-3 text-status-fail shrink-0" /> : <AlertTriangle className="h-3 w-3 text-status-warn shrink-0" />}
              <span className="font-mono text-[11px] text-info shrink-0">{d.file}:{d.line}</span>
              <span className="text-[11px] text-foreground/80 truncate">{d.message}</span>
              <ArrowRight className="h-3 w-3 text-muted-foreground/0 group-hover:text-muted-foreground/50 ml-auto shrink-0" />
            </button>
          ))}
        </div>
      );
    }
    function ActivityRow({ e, open, onToggle, onOpenRun, onOpenWave, onOpenFile, onReRun }) {
      const Icon = (ACT_KIND[e.kind]||ACT_KIND.write).icon;
      return (
        <div className="mx-2 my-0.5">
          <button onClick={onToggle} className={cn("group w-full flex items-center gap-2.5 px-2 py-1.5 rounded-md text-left transition-colors", open ? "bg-surface-2" : "hover:bg-surface-1")}>
            <span className={cn("shrink-0 grid place-items-center h-6 w-6 rounded-md", e.status==="failed" ? "bg-status-fail/10" : e.status==="running" ? "bg-status-running/10" : "bg-surface-2")}>
              <span className={actText(e.status)}><Icon className="h-3.5 w-3.5" /></span>
            </span>
            <span className="shrink-0"><ActMark s={e.status} /></span>
            <span className="font-mono text-[12px] text-foreground/90 shrink-0">{e.tool}</span>
            <span className="font-mono text-[11px] text-muted-foreground truncate shrink-0 max-w-[150px]">{e.target}{e.runId && <span className="text-primary/70"> · {e.runId}</span>}</span>
            <span className={cn("text-[11px] truncate", e.status==="failed" ? "text-status-fail" : "text-muted-foreground/80")}>{e.summary}</span>
            <span className="ml-auto flex items-center gap-2 shrink-0"><ActActor a={e.actor} /><span className="font-mono text-[10px] text-muted-foreground/60 tabular-nums">{relativeTime(e.ts)}</span><ChevronRight className={cn("h-3.5 w-3.5 text-muted-foreground/50 transition-transform", open && "rotate-90")} /></span>
          </button>
          {open && (
            <div className="ml-10 mr-2 mb-2 mt-1 space-y-2 animate-fade-in">
              {e.kind==="lint" ? (
                <LintDiagnostics result={e.result} onOpenLine={(d)=>onOpenFile(d.file, d.line)} />
              ) : (
                <>
                  <div className="text-[10px] font-mono text-muted-foreground uppercase tracking-wide">args</div>
                  <pre className="text-[10.5px] font-mono leading-relaxed bg-surface-0 border border-border/60 rounded px-2 py-1.5 overflow-x-auto text-foreground/70 whitespace-pre-wrap">{JSON.stringify(e.args, null, 2)}</pre>
                  <div className="text-[10px] font-mono text-muted-foreground uppercase tracking-wide">result</div>
                  <pre className={cn("text-[10.5px] font-mono leading-relaxed rounded px-2 py-1.5 overflow-x-auto whitespace-pre-wrap border", e.status==="failed" ? "bg-status-fail/5 border-status-fail/20 text-status-fail" : "bg-surface-0 border-border/60 text-foreground/70")}>{typeof e.result==="string" ? e.result : (e.result?.log || JSON.stringify(e.result, null, 2))}</pre>
                </>
              )}
              <div className="flex items-center gap-1.5 flex-wrap pt-0.5">
                {e.kind==="sim" && e.vcdPath && <button onClick={()=>onOpenWave(e)} title={`fetch & parse ${e.vcdPath}`} className="h-6 px-2 rounded text-[11px] bg-surface-2 hover:bg-surface-3 text-foreground/80 inline-flex items-center gap-1"><Waves className="h-3 w-3" />Open waveform</button>}
                {e.runId && <button onClick={()=>onOpenRun(e.runId)} className="h-6 px-2 rounded text-[11px] bg-surface-2 hover:bg-surface-3 text-foreground/80 inline-flex items-center gap-1"><ListTree className="h-3 w-3" />Open {e.runId}</button>}
                {e.kind==="synth" && <button className="h-6 px-2 rounded text-[11px] bg-surface-2 hover:bg-surface-3 text-foreground/80 inline-flex items-center gap-1"><GitCompare className="h-3 w-3" />Compare</button>}
                <button onClick={()=>onReRun(e)} className="h-6 px-2 rounded text-[11px] bg-surface-2 hover:bg-surface-3 text-foreground/80 inline-flex items-center gap-1"><RefreshCw className="h-3 w-3" />Re-run</button>
                <span className="ml-auto font-mono text-[9px] text-muted-foreground/40 uppercase tracking-wide self-center">GET /activity</span>
              </div>
            </div>
          )}
        </div>
      );
    }
    function ActivityFeed({ activity, onOpenRun, onOpenWave, onOpenFile, onReRun }) {
      const [filter, setFilter] = useState("all");
      const [actor, setActor] = useState("all");
      const [q, setQ] = useState("");
      const [openId, setOpenId] = useState("ac5");
      const errCount = activity.filter(e=>e.status==="failed").length;
      const counts = useMemo(()=>{ const c={}; activity.forEach(e=>c[e.kind]=(c[e.kind]||0)+1); return c; }, [activity]);
      const list = activity.filter(e => {
        if (filter==="err") { if (e.status!=="failed") return false; }
        else if (filter!=="all" && e.kind!==filter) return false;
        if (actor!=="all" && e.actor!==actor) return false;
        if (q && !(`${e.tool} ${e.target} ${e.summary} ${e.runId||""}`.toLowerCase().includes(q.toLowerCase()))) return false;
        return true;
      });
      return (
        <div className="flex flex-col h-full min-h-0">
          <div className="flex items-center gap-1.5 px-3 h-9 border-b border-border/60 shrink-0 flex-wrap">
            {ACT_FILTERS.map(([k,l])=>(
              <button key={k} onClick={()=>setFilter(k)} className={cn("inline-flex items-center gap-1 h-6 px-2 rounded-full text-[11px] font-medium border transition-colors", filter===k ? "border-primary/40 bg-primary/15 text-foreground" : "border-border bg-surface-1 text-muted-foreground hover:text-foreground hover:bg-surface-2")}>
                {l}<span className="text-[9px] font-mono tabular-nums opacity-60">{k==="all"?activity.length:(counts[k]||0)}</span>
              </button>
            ))}
            <button onClick={()=>setFilter(filter==="err"?"all":"err")} className={cn("inline-flex items-center gap-1 h-6 px-2 rounded-full text-[11px] font-medium border transition-colors", filter==="err" ? "border-status-fail/40 bg-status-fail/15 text-status-fail" : "border-border bg-surface-1 text-muted-foreground hover:text-foreground hover:bg-surface-2")}>
              <AlertTriangle className="h-3 w-3" />Errors<span className="text-[9px] font-mono tabular-nums opacity-60">{errCount}</span>
            </button>
            <div className="h-4 w-px bg-border mx-0.5" />
            <button onClick={()=>setActor(actor==="all"?"agent":actor==="agent"?"user":"all")} className="inline-flex items-center gap-1 h-6 px-2 rounded-full text-[11px] border border-border bg-surface-1 text-muted-foreground hover:text-foreground">
              {actor==="all" ? <><Bot className="h-3 w-3" /><User className="h-3 w-3" />Both</> : actor==="agent" ? <><Bot className="h-3 w-3" />Agent</> : <><User className="h-3 w-3" />You</>}
            </button>
            <div className="ml-auto flex items-center gap-1.5 h-6 px-2 rounded-md border border-border bg-surface-1 w-[150px]">
              <Search className="h-3 w-3 text-muted-foreground" /><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search…" className="flex-1 bg-transparent outline-none text-[11px] placeholder:text-muted-foreground min-w-0" />
            </div>
          </div>
          <div className="flex-1 overflow-y-auto thin-scrollbar py-1">
            {list.length===0 && <div className="px-3 py-8 text-center text-xs text-muted-foreground">No matching activity</div>}
            {list.map(e => <ActivityRow key={e.id} e={e} open={openId===e.id} onToggle={()=>setOpenId(openId===e.id?null:e.id)} onOpenRun={onOpenRun} onOpenWave={onOpenWave} onOpenFile={onOpenFile} onReRun={onReRun} />)}
          </div>
        </div>
      );
    }
    function RunsPane({ runs, selected, onSelect, onOpenArtifact, unread }) {
      const childrenByParent = new Map();
      for (const r of runs) if (r.parentRunId) { const a = childrenByParent.get(r.parentRunId) ?? []; a.push(r); childrenByParent.set(r.parentRunId, a); }
      const roots = runs.filter((r) => !r.parentRunId);
      const glyphsFor = (r) => r.kind === "synth" ? [[`report:${r.id}`, BarChart3], [`layout:${r.id}`, Layers]] : [[`wave:${r.id}`, Activity]];
      const Row = ({ r, child }) => {
        const sel = r.id === selected;
        return (
          <div onClick={() => onSelect(r.id)} className={cn("group grid grid-cols-[16px_18px_1fr_110px_116px_54px_66px] items-center gap-2 px-3 h-8 cursor-pointer text-xs border-b border-border/40", sel ? "bg-surface-2" : "hover:bg-surface-1")}>
            <span className={cn("h-2 w-2 rounded-full", statusDot(r.status))} />
            <span className={cn(sel ? "text-primary" : "text-muted-foreground")}>{r.kind === "sim" ? <Waves className="h-3.5 w-3.5" /> : <Cpu className="h-3.5 w-3.5" />}</span>
            <span className="font-mono flex items-center gap-1.5 min-w-0">{child && <CornerDownRight className="h-3 w-3 text-muted-foreground/50 shrink-0" />}<span className="truncate">{r.id}</span>{unread && unread.includes(r.id) && <span className="h-1.5 w-1.5 rounded-full bg-primary animate-pulse-subtle shrink-0" title="new" />}</span>
            <span className="font-mono text-muted-foreground truncate">{r.top}</span>
            <span className={cn("font-mono", statusText(r.status))}>{r.status}{r.kind === "sim" && r.failure ? ` @${r.failure.timeNs}ns` : ""}</span>
            <span className="font-mono text-muted-foreground tabular-nums">{relativeTime(r.createdAt)}</span>
            <span className="flex items-center gap-0.5 justify-end">
              {glyphsFor(r).map(([k, I]) => <button key={k} onClick={(e) => { e.stopPropagation(); onOpenArtifact && onOpenArtifact(k, r.id); }} title={`open ${k.split(":")[0]}`} className="h-5 w-5 grid place-items-center rounded text-muted-foreground/50 hover:text-foreground hover:bg-surface-3"><I className="h-3 w-3" /></button>)}
              {r.pinned && <Pin className="h-3 w-3 text-primary shrink-0" />}
            </span>
          </div>
        );
      };
      return (
        <div className="flex flex-col h-full min-h-0">
          <div className="grid grid-cols-[16px_18px_1fr_110px_116px_54px_66px] items-center gap-2 px-3 h-6 shrink-0 text-[9px] font-semibold uppercase tracking-wider text-muted-foreground/70 border-b border-border/60">
            <span></span><span></span><span>Run</span><span>Top</span><span>Result</span><span>Age</span><span className="text-right">Open</span>
          </div>
          <div className="flex-1 overflow-y-auto thin-scrollbar">
            {roots.map((r) => (
              <React.Fragment key={r.id}>
                <Row r={r} />
                {(childrenByParent.get(r.id) ?? []).map((c) => <Row key={c.id} r={c} child />)}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }
    function BottomDock({ open, setOpen, dockTab, setDockTab, selectedRun, onSelectRun, runs, activity, onOpenRun, onOpenWave, onOpenFile, onReRun, onOpenArtifact, unread }) {
      const isRuns = dockTab === "runs";
      const running = activity.find(e => e.status==="running");
      return (
        <div className={cn("flex flex-col border-t border-border bg-surface-1 shrink-0", open ? "h-56" : "h-8")}>
          <div className="flex items-center gap-1 px-2 h-8 shrink-0">
            <button onClick={() => { setDockTab("activity"); setOpen(true); }} className={cn("flex items-center gap-1.5 text-xs px-2 h-6 rounded transition-colors", !isRuns ? "bg-surface-2 text-foreground font-medium" : "text-muted-foreground hover:text-foreground hover:bg-surface-2/50")}>
              <Activity className="h-3.5 w-3.5" />Activity<span className="font-mono text-[10px] text-muted-foreground">{activity.length}</span>
            </button>
            <button onClick={() => { setDockTab("runs"); setOpen(true); }} className={cn("flex items-center gap-1.5 text-xs px-2 h-6 rounded transition-colors", isRuns ? "bg-surface-2 text-foreground font-medium" : "text-muted-foreground hover:text-foreground hover:bg-surface-2/50")}>
              <ListTree className="h-3.5 w-3.5" />Runs<span className="font-mono text-[10px] text-muted-foreground">{runs.length}</span>
            </button>
            {running && <span className="ml-1 inline-flex items-center gap-1.5 h-6 pl-2 pr-2.5 rounded-full border border-status-running/30 bg-status-running/10 text-status-running text-[11px] font-medium"><span className="h-1.5 w-1.5 rounded-full bg-status-running animate-pulse-subtle" />{running.runId||running.tool} · running<RefreshCw className="h-3 w-3 animate-spin" /></span>}
            <div className="ml-auto flex items-center gap-0.5">
              {isRuns && open && <Btn variant="ghost" size="icon-sm" title="Compare"><GitCompare className="h-3.5 w-3.5" /></Btn>}
              <Btn variant="ghost" size="icon-sm" title="Refresh"><RefreshCw className="h-3.5 w-3.5" /></Btn>
              <Btn variant="ghost" size="icon-sm" onClick={() => setOpen(!open)} title={open ? "Collapse" : "Expand"}>{open ? <ChevronDown className="h-4 w-4" /> : <ChevronUp className="h-4 w-4" />}</Btn>
            </div>
          </div>
          {open && <div className="flex-1 min-h-0 animate-fade-in">{isRuns ? <RunsPane runs={runs} selected={selectedRun} onSelect={onSelectRun} onOpenArtifact={onOpenArtifact} unread={unread} /> : <ActivityFeed activity={activity} onOpenRun={onOpenRun} onOpenWave={onOpenWave} onOpenFile={onOpenFile} onReRun={onReRun} />}</div>}
        </div>
      );
    }

    /* ======================= assistant ======================================= */
    const toolLabelMap = { write_spec: "write_spec", write_file: "write_file", linter_tool: "linter_tool", simulation_tool: "simulation_tool", start_synthesis: "start_synthesis" };
    function ToolCallCard({ toolCall, result }) {
      const [open, setOpen] = useState(false);
      const s = (result?.status || "").toLowerCase();
      const ok = ["success", "passed", "test_passed"].includes(s);
      const err = s.includes("fail") || s.includes("error");
      const args = toolCall.args;
      const summary = args.filename || args.design_file || args.module_name || (Array.isArray(args.verilog_files) ? args.verilog_files.join(", ") : null);
      return (
        <div className="text-xs">
          <button className="flex items-center gap-1.5 text-muted-foreground/70 hover:text-foreground transition-colors w-full text-left group" onClick={() => setOpen(!open)}>
            <span className="shrink-0">{ok ? <Check className="h-3 w-3 text-status-pass" /> : err ? <X className="h-3 w-3 text-status-fail" /> : <Wrench className="h-3 w-3" />}</span>
            <span className="font-mono">{toolLabelMap[toolCall.name] || toolCall.name}</span>
            {summary && <><span className="text-muted-foreground/30">·</span><span className="font-mono truncate max-w-[160px] text-muted-foreground/50">{summary}</span></>}
            <span className="ml-auto opacity-0 group-hover:opacity-100 transition-opacity shrink-0">{open ? <ChevronDown className="h-3 w-3" /> : <ChevronRight className="h-3 w-3" />}</span>
          </button>
          {open && result && (
            <div className="mt-1.5 ml-4 space-y-1.5">
              <pre className="text-[10.5px] bg-surface-1 border border-border/40 p-2 rounded overflow-x-auto max-h-[160px] font-mono text-foreground/70">{JSON.stringify(toolCall.args, null, 2)}</pre>
              <pre className={cn("text-[10.5px] border p-2 rounded overflow-x-auto whitespace-pre-wrap font-mono", err ? "bg-status-fail/5 border-status-fail/20 text-status-fail" : "bg-surface-1 border-border/40 text-foreground/70")}>{result.content}</pre>
            </div>
          )}
        </div>
      );
    }
    function MdText({ content }) {
      const html = content
        .replace(/`([^`]+)`/g, '<code class="bg-surface-2 text-primary px-1 py-0.5 rounded text-[12px] font-mono">$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong class="font-semibold text-foreground">$1</strong>');
      return <div className="text-[13px] leading-relaxed text-foreground/90" dangerouslySetInnerHTML={{ __html: html }} />;
    }
    function Assistant({ onCollapse, model, setModel, onOpenMcp }) {
      const [thread, setThread] = useState("t1");
      const [threads, setThreads] = useState(THREADS);
      const newChat = () => { const id = "t" + (threads.length + 1); setThreads((t) => [{ id, name: "New chat", updated: "now" }, ...t]); setThread(id); };
      return (
        <div className="flex flex-col h-full bg-surface-0">
          <div className="flex items-center gap-1 h-9 pl-1.5 pr-1.5 border-b border-border/70 shrink-0">
            <ThreadMenu threads={threads} active={thread} onSelect={setThread} onNew={newChat} />
            <div className="ml-auto flex items-center gap-0.5">
              <ModelPicker model={model} onChange={setModel} />
              <Btn variant="ghost" size="icon-sm" title="Connect via MCP" onClick={onOpenMcp}><Plug className="h-4 w-4" /></Btn>
              <Btn variant="ghost" size="icon-sm" title="New chat" onClick={newChat}><SquarePen className="h-3.5 w-3.5" /></Btn>
              <Btn variant="ghost" size="icon-sm" title="Collapse" onClick={onCollapse}><PanelRightClose className="h-4 w-4" /></Btn>
            </div>
          </div>
          <div className="flex-1 overflow-y-auto thin-scrollbar px-3 py-3 space-y-4">
            {MESSAGES.map((m) => m.role === "user" ? (
              <div key={m.id} className="flex justify-end">
                <div className="max-w-[85%] bg-primary text-primary-foreground rounded-lg rounded-tr-sm px-3 py-2 text-[13px] leading-relaxed">{m.content}</div>
              </div>
            ) : (
              <div key={m.id} className="flex items-start gap-2">
                <div className="shrink-0 w-6 h-6 rounded-md bg-primary/10 flex items-center justify-center mt-0.5"><Bot className="h-3.5 w-3.5 text-primary" /></div>
                <div className="flex-1 min-w-0 space-y-2.5">
                  {m.blocks.map((b, i) => b.type === "text" ? <MdText key={i} content={b.content} /> : <ToolCallCard key={i} toolCall={b.toolCall} result={b.result} />)}
                </div>
              </div>
            ))}
          </div>
          <div className="p-2.5 border-t border-border/70 shrink-0">
            <div className="flex items-end gap-2 rounded-lg border border-border bg-surface-1 px-2.5 py-1.5 focus-within:border-primary/50">
              <textarea rows={1} placeholder="Message…" className="flex-1 bg-transparent resize-none outline-none text-[13px] placeholder:text-muted-foreground py-0.5 max-h-24" />
              <Btn variant="primary" size="icon-sm" className="rounded-md"><Send className="h-3.5 w-3.5" /></Btn>
            </div>
          </div>
        </div>
      );
    }

    /* ======================= shell =========================================== */
    function Workbench() {
      const [dark, setDark] = useState(true);
      const [selectedFile, setSelectedFile] = useState("sync_fifo.v");
      const [openTabs, setOpenTabs] = useState(["report:S-04"]);
      const [activeTab, setActiveTab] = useState("report:S-04");
      const [flashKey, setFlashKey] = useState(null);
      const [unread, setUnread] = useState([]);
      const [chatOpen, setChatOpen] = useState(true);
      const [dockOpen, setDockOpen] = useState(true);
      const [dockTab, setDockTab] = useState("activity");
      const [selectedRun, setSelectedRun] = useState("S-04");
      const [paletteOpen, setPaletteOpen] = useState(false);
      const [quickOpen, setQuickOpen] = useState(false);
      const [ctxMenu, setCtxMenu] = useState(null);
      const [runs, setRuns] = useState(RUNS);
      const [activity, setActivity] = useState(() => [...ACTIVITY_SEED].reverse());
      const [modalCmd, setModalCmd] = useState(null);
      const [model, setModel] = useState("gemini-3-flash-preview");
      const [mcpOpen, setMcpOpen] = useState(false);
      const [toasts, setToasts] = useState([]);
      const runsRef = useRef(runs);
      useEffect(() => { runsRef.current = runs; }, [runs]);

      const artifacts = useMemo(() => allArtifacts(runs), [runs]);
      const resolveArt = useCallback((key) => allArtifacts(runsRef.current).find((a) => a.key === key), []);
      // THE abstraction — every source calls this. focus-if-open, else open.
      const openArtifact = useCallback((key) => {
        if (!key || !resolveArt(key)) return;
        setOpenTabs((t) => t.includes(key) ? t : [...t, key]);
        setActiveTab(key);
        setFlashKey(key); setTimeout(() => setFlashKey(null), 500);
      }, [resolveArt]);
      const closeTab = useCallback((key) => {
        setOpenTabs((t) => { const n = t.filter((k) => k !== key); setActiveTab((a) => a === key ? (n[n.length - 1] || null) : a); return n; });
      }, []);
      const openRunArtifact = useCallback((rid) => {
        const r = runsRef.current.find((x) => x.id === rid);
        if (!r) return;
        setUnread((u) => u.filter((x) => x !== rid));
        openArtifact(r.kind === "synth" ? `report:${rid}` : `wave:${rid}`);
      }, [openArtifact]);
      const openArtifactKey = useCallback((key, rid) => { if (rid) setUnread((u) => u.filter((x) => x !== rid)); openArtifact(key); }, [openArtifact]);

      const pushActivity = useCallback((e) => setActivity((a) => [e, ...a]), []);
      const updateActivity = useCallback((id, patch) => setActivity((a) => a.map((e) => e.id === id ? { ...e, ...patch } : e)), []);
      const openWaveform = useCallback((e) => { if (e.runId) openArtifact(`wave:${e.runId}`); }, [openArtifact]);
      const openFileAt = useCallback((name) => { setSelectedFile(name); openArtifact(`code:${name}`); }, [openArtifact]);

      const pushToast = useCallback((t) => {
        const key = Math.random().toString(36).slice(2);
        setToasts((a) => [...a.slice(-3), { ...t, key }]);
        setTimeout(() => setToasts((a) => a.filter((x) => x.key !== key)), 3400);
      }, []);

      function nextRunId(cmd, values) {
        const rs = runsRef.current;
        if (cmd.id === "pnr") { const p = (values && values.run_id) || "S-04"; const kids = rs.filter((r) => String(r.parentRunId) === p).length; return `${p}.${kids + 1}`; }
        const prefix = cmd.kind === "sim" ? "R" : "S";
        const nums = rs.map((r) => { const m = String(r.id).match(new RegExp("^" + prefix + "-(\\d+)")); return m ? parseInt(m[1], 10) : 0; });
        return `${prefix}-${String(Math.max(0, ...nums) + 1).padStart(2, "0")}`;
      }

      const runCommand = useCallback((id, values) => {
        const cmd = COMMANDS[id]; if (!cmd) return;
        const actId = "a" + Date.now();
        const actor = "user";
        if (cmd.kind === "sim" || cmd.kind === "synth") {
          const newId = nextRunId(cmd, values);
          const isSim = cmd.kind === "sim";
          const top = isSim ? MANIFEST.simTop : MANIFEST.synthTop;
          const parent = id === "pnr" ? ((values && values.run_id) || "S-04") : undefined;
          const run = { id: newId, kind: isSim ? "sim" : "synth", status: "running", top, createdAt: new Date().toISOString(), pinned: false, parentRunId: parent };
          setRuns((r) => [run, ...r]);
          setSelectedRun(newId); setDockTab("activity"); setDockOpen(true);
          pushActivity({ id: actId, actor, kind: isSim ? "sim" : "synth", tool: cmd.tool, target: top, status: "running", ts: new Date().toISOString(), runId: newId, summary: "dispatched", args: values || {}, result: { runId: newId, status: "running" } });
          pushToast({ tool: cmd.tool, msg: `Dispatched ${newId} · ${cmd.label.toLowerCase()}`, status: "running" });
          setTimeout(() => {
            const ppa = { areaUm2: 1284.5, cells: 412, wnsNs: 0.42, tnsNs: 0, fmaxMhz: 158.7, powerMw: 3.1 };
            setRuns((r) => r.map((x) => x.id === newId ? { ...x, status: "passed", ...(isSim ? { passMarkerFound: true, vcdPath: "dump.vcd" } : { ppa }) } : x));
            setUnread((u) => [...u, newId]); // surfaces on the run row — no auto-switch of the center
            updateActivity(actId, isSim
              ? { status: "passed", summary: "PASS · 1024/1024", vcdPath: `build/sim/${newId}/dump.vcd`, result: { runId: newId, status: "passed", passMarker: "TEST PASSED", markerFound: true, transactions: "1024/1024", vcdPath: `build/sim/${newId}/dump.vcd`, log: "TEST PASSED" } }
              : { status: "passed", summary: "WNS +0.42ns · 412 cells · 158.7 MHz", result: { runId: newId, status: "passed", ppa, drc: 0, log: `${newId} complete · WNS +0.42ns · 0 DRC` } });
            pushToast({ msg: `${newId} passed`, status: "passed" });
          }, 1800);
        } else {
          // lint (sync) — structured diagnostics, mirrors POST /lint. No auto-switch of the center.
          setDockTab("activity"); setDockOpen(true);
          pushActivity({ id: actId, actor, kind: "lint", tool: "linter_tool", target: "rtl (2 files)", status: "warn", ts: new Date().toISOString(), summary: "passed · 2 warnings",
            args: { verilog_files: ["sync_fifo.v", "fifo_mem.v"] },
            result: { status: "passed", command: "iverilog -t null -Wall sync_fifo.v fifo_mem.v", errors: [], warnings: [
              { file: "sync_fifo.v", line: 44, severity: "warning", message: "parameter DEPTH unused in this scope" },
              { file: "fifo_mem.v", line: 19, severity: "warning", message: "implicit conversion narrows 9 → 8 bits" },
            ] } });
          pushToast({ tool: cmd.tool, msg: "Lint passed · 2 warnings", status: "warn" });
        }
      }, [pushToast, pushActivity, updateActivity]);

      const openModal = useCallback((id) => setModalCmd(id), []);

      useEffect(() => { document.documentElement.classList.toggle("dark", dark); document.documentElement.classList.toggle("light", !dark); }, [dark]);
      useEffect(() => {
        const h = (e) => {
          const mod = e.metaKey || e.ctrlKey;
          if (mod && e.key.toLowerCase() === "k") { e.preventDefault(); setPaletteOpen((o) => !o); }
          else if (mod && e.key.toLowerCase() === "p") { e.preventDefault(); setQuickOpen((o) => !o); }
          else if (e.key === "Escape") { setPaletteOpen(false); setQuickOpen(false); }
          else if (mod && e.key.toLowerCase() === "l") { e.preventDefault(); runCommand("lint"); }
          else if (mod && e.key.toLowerCase() === "r") { e.preventDefault(); runCommand("sim"); }
          else if (mod && e.key.toLowerCase() === "y") { e.preventDefault(); runCommand("synth"); }
          else if (mod && e.key.toLowerCase() === "e") { e.preventDefault(); runCommand("pnr"); }
          else if (mod && e.key.toLowerCase() === "j") { e.preventDefault(); setDockTab("runs"); setDockOpen(true); }
        };
        window.addEventListener("keydown", h);
        return () => window.removeEventListener("keydown", h);
      }, [runCommand]);

      const openFile = (name) => {
        setSelectedFile(name);
        if (CODE_FILES[name]) openArtifact(`code:${name}`);
        else if (name === "spec.yaml") openArtifact("spec");
        else if (name.endsWith(".vcd")) openArtifact("wave:R-07");
        else if (name.endsWith(".json")) openArtifact("report:S-04");
        else if (name.endsWith(".v") || name.endsWith(".sv") || name.endsWith(".vh") || name.endsWith(".sdc")) openArtifact(`code:${name}`);
      };

      return (
        <main className="h-screen w-screen overflow-hidden flex flex-col bg-background text-foreground">
          <TopBar dark={dark} setDark={setDark} onPalette={() => setPaletteOpen(true)} activity={activity} onOpenActivity={() => { setDockTab("activity"); setDockOpen(true); }} onOpenMcp={() => setMcpOpen(true)} />
          <div className="flex-1 min-h-0 flex">
            {/* left explorer */}
            <div className="w-[19%] min-w-[200px] max-w-[300px] flex flex-col bg-surface-0 border-r border-border/70 min-h-0">
              <FileExplorer selected={selectedFile} onSelect={openFile} onContext={setCtxMenu} />
            </div>
            {/* center + dock */}
            <div className="flex-1 flex flex-col min-h-0 border-r border-border/70">
              <div className="flex-1 min-h-0"><ArtifactCenter tabs={openTabs} active={activeTab} onActivate={setActiveTab} onClose={closeTab} flashKey={flashKey} resolve={resolveArt} runs={runs} /></div>
              <BottomDock open={dockOpen} setOpen={setDockOpen} dockTab={dockTab} setDockTab={setDockTab} selectedRun={selectedRun} onSelectRun={openRunArtifact} runs={runs} activity={activity} onOpenRun={openRunArtifact} onOpenWave={openWaveform} onOpenFile={openFileAt} onReRun={(e) => runCommand(e.kind === "synth" ? "synth" : e.kind === "sim" ? "sim" : "lint")} onOpenArtifact={openArtifactKey} unread={unread} />
            </div>
            {/* right assistant */}
            {chatOpen ? (
              <div className="w-[26%] min-w-[280px] max-w-[420px] flex flex-col min-h-0 animate-fade-in"><Assistant onCollapse={() => setChatOpen(false)} model={model} setModel={setModel} onOpenMcp={() => setMcpOpen(true)} /></div>
            ) : (
              <button onClick={() => setChatOpen(true)} className="w-8 shrink-0 flex flex-col items-center gap-2 py-3 bg-surface-1 border-l border-border/70 text-muted-foreground hover:text-primary" title="Open assistant">
                <PanelRightOpen className="h-4 w-4" />
                <span className="text-[10px] uppercase tracking-wider [writing-mode:vertical-rl] rotate-180">Assistant</span>
              </button>
            )}
          </div>

          <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} onRun={runCommand} onOptions={openModal} />
          <QuickOpen open={quickOpen} onClose={() => setQuickOpen(false)} artifacts={artifacts} onOpen={openArtifact} />
          <ContextMenu menu={ctxMenu} onClose={() => setCtxMenu(null)} onRun={(id) => runCommand(id)} onOptions={openModal} />
          {modalCmd && <CommandModal id={modalCmd} onClose={() => setModalCmd(null)} onInvoke={(id, vals) => { runCommand(id, vals); setModalCmd(null); }} />}
          {mcpOpen && <McpModal onClose={() => setMcpOpen(false)} />}
          <Toasts items={toasts} />
        </main>
      );
    }

    createRoot(document.getElementById("root")).render(<Workbench />);
  </script>
</body>
</html>
