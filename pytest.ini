[pytest]
testpaths = tests
norecursedirs = .git .venv frontend workspace legacy paper __pycache__

# One source of truth for CI test selection: a test's marker defines its class,
# not a hand-maintained filename list. The fast PR job runs the pure-Python set:
#
#     pytest -m 'not requires_eda and not slow and not requires_services'
#
# and heavy tests get an opt-in / nightly home (see docs/TESTING.md). Adding a
# new dep-light test gates automatically; nothing to remember to wire up.
markers =
    requires_eda: needs a real EDA binary or image (iverilog, verilator, yosys, sby, cocotb, XLS, ORFS/real synthesis). Excluded from the fast PR job.
    requires_services: needs a live external service or daemon (real Docker daemon, Postgres, GCS/Cloud Run, WorkOS). Excluded from the fast PR job.
    slow: heavy/long-running (real toolchain end-to-end runs). Excluded from the fast PR job.

# pytest-asyncio in strict mode: only @pytest.mark.asyncio coroutines run as
# async (keeps the marker honest and silences the unknown-mark warning).
asyncio_mode = strict
